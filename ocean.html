<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ocean</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box} html,body{width:100%;height:100%;overflow:hidden;background:#0a1420}
  canvas{display:block;width:100vw;height:100vh;cursor:grab} canvas:active{cursor:grabbing}
  #t{position:fixed;top:12px;left:14px;font:12px ui-monospace,Menlo,monospace;color:#bfe0ff;opacity:.85;user-select:none}#t b{color:#7fc4ff}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="t"><b>≋ OCEAN</b> · Gerstner waves · drag to look around</div>
<script>
"use strict";
(function(){
  const cv=document.getElementById("c"), gl=cv.getContext("webgl2");
  if(!gl){document.body.innerHTML="<p style='color:#f88;font:16px monospace;padding:40px'>WebGL2 not supported</p>";return;}
  // ---- mat4 ----
  function persp(f,a,n,fa){const t=1/Math.tan(f/2),o=new Float32Array(16);o[0]=t/a;o[5]=t;o[10]=(fa+n)/(n-fa);o[11]=-1;o[14]=2*fa*n/(n-fa);return o;}
  function look(e,c,u){const z=norm(sub(e,c)),x=norm(cross(u,z)),y=cross(z,x);return new Float32Array([x[0],y[0],z[0],0,x[1],y[1],z[1],0,x[2],y[2],z[2],0,-dot(x,e),-dot(y,e),-dot(z,e),1]);}
  function mul(a,b){const o=new Float32Array(16);for(let i=0;i<4;i++)for(let j=0;j<4;j++){let s=0;for(let k=0;k<4;k++)s+=a[k*4+j]*b[i*4+k];o[i*4+j]=s;}return o;}
  const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]],cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]],dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2],norm=a=>{const l=Math.hypot(...a)||1;return [a[0]/l,a[1]/l,a[2]/l];};

  const vs=`#version 300 es
  precision highp float;
  layout(location=0) in vec2 g; uniform mat4 u_vp; uniform float u_time; uniform vec3 u_cam;
  out vec3 v_pos; out vec3 v_nrm;
  // gerstner waves
  vec3 gerstner(vec2 p, out vec3 nrm){
    vec3 P=vec3(p.x,0.,p.y); vec3 n=vec3(0.,1.,0.);
    // dir, amp, len, speed
    const int N=6;
    vec2 dir[6]; float amp[6]; float len[6]; float spd[6];
    dir[0]=vec2(1.,0.3); amp[0]=0.32; len[0]=8.0; spd[0]=1.0;
    dir[1]=vec2(-0.7,1.0); amp[1]=0.20; len[1]=4.5; spd[1]=1.3;
    dir[2]=vec2(0.5,-0.8); amp[2]=0.12; len[2]=2.6; spd[2]=1.7;
    dir[3]=vec2(1.0,1.0); amp[3]=0.07; len[3]=1.5; spd[3]=2.2;
    dir[4]=vec2(-1.0,0.2); amp[4]=0.045; len[4]=0.9; spd[4]=2.8;
    dir[5]=vec2(0.2,1.0); amp[5]=0.03; len[5]=0.55; spd[5]=3.4;
    for(int i=0;i<N;i++){
      vec2 d=normalize(dir[i]); float w=6.2831/len[i]; float ph=spd[i]*w*u_time;
      float steep=0.7/(w*amp[i]*float(N));
      float a=dot(d,p)*w+ph; float c=cos(a),s=sin(a);
      P.x+=steep*amp[i]*d.x*c; P.z+=steep*amp[i]*d.y*c; P.y+=amp[i]*s;
      float wa=w*amp[i];
      n.x-=d.x*wa*c; n.z-=d.y*wa*c; n.y-=steep*wa*s;
    }
    nrm=normalize(n); return P;
  }
  void main(){ vec3 nrm; vec3 P=gerstner(g,nrm); v_pos=P; v_nrm=nrm; gl_Position=u_vp*vec4(P,1.); }`;
  const fs=`#version 300 es
  precision highp float; in vec3 v_pos; in vec3 v_nrm; uniform vec3 u_cam; uniform float u_time; out vec4 o;
  vec3 sky(vec3 d){
    float t=clamp(d.y*0.5+0.5,0.,1.);
    vec3 c=mix(vec3(.55,.7,.9),vec3(.15,.35,.7),smoothstep(0.,1.,t));
    vec3 sun=normalize(vec3(0.4,0.5,-0.7));
    c+=vec3(1.,.9,.7)*pow(max(dot(d,sun),0.),120.)*1.5; // sun
    c+=vec3(1.,.95,.85)*pow(max(dot(d,sun),0.),8.)*0.15;
    return c;
  }
  void main(){
    vec3 N=normalize(v_nrm); vec3 V=normalize(u_cam-v_pos);
    vec3 sun=normalize(vec3(0.4,0.5,-0.7));
    float fres=pow(1.-max(dot(N,V),0.),5.); fres=mix(0.04,1.,fres);
    vec3 R=reflect(-V,N); vec3 refl=sky(R);
    vec3 deep=vec3(0.01,0.06,0.12), shallow=vec3(0.0,0.22,0.32);
    vec3 water=mix(deep,shallow,max(N.y,0.)*0.6);
    float spec=pow(max(dot(R,sun),0.),200.)*2.0;             // glitter
    float foam=smoothstep(0.5,0.62,v_pos.y)*0.8;             // crest foam
    vec3 col=mix(water,refl,fres)+vec3(spec)+vec3(foam);
    // distance fog to horizon
    float fog=clamp(length(u_cam.xz-v_pos.xz)/55.,0.,1.);
    col=mix(col,sky(normalize(v_pos-u_cam)),fog*fog);
    o=vec4(pow(col,vec3(0.85)),1.);
  }`;
  function sh(t,s){const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);if(!gl.getShaderParameter(x,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(x);return x;}
  const pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,vs));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);
  if(!gl.getProgramParameter(pr,gl.LINK_STATUS))throw gl.getProgramInfoLog(pr);
  // grid mesh
  const G=180, S=60;
  const verts=[]; for(let z=0;z<G;z++)for(let x=0;x<G;x++){verts.push((x/(G-1)-0.5)*S,(z/(G-1)-0.5)*S);}
  const idx=[]; for(let z=0;z<G-1;z++)for(let x=0;x<G-1;x++){const i=z*G+x;idx.push(i,i+1,i+G,i+1,i+G+1,i+G);}
  const vao=gl.createVertexArray();gl.bindVertexArray(vao);
  const vb=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,vb);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(verts),gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
  const ib=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ib);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint32Array(idx),gl.STATIC_DRAW);
  const U={vp:gl.getUniformLocation(pr,"u_vp"),time:gl.getUniformLocation(pr,"u_time"),cam:gl.getUniformLocation(pr,"u_cam")};
  let yaw=0.4,pitch=-0.12,drag=null;
  cv.addEventListener("pointerdown",e=>drag=[e.clientX,e.clientY]);window.addEventListener("pointerup",()=>drag=null);
  cv.addEventListener("pointermove",e=>{if(!drag)return;yaw-=(e.clientX-drag[0])*0.004;pitch=Math.max(-0.5,Math.min(0.3,pitch-(e.clientY-drag[1])*0.003));drag=[e.clientX,e.clientY];});
  function rs(){const d=Math.min(devicePixelRatio||1,2);cv.width=cv.clientWidth*d;cv.height=cv.clientHeight*d;}
  addEventListener("resize",rs);rs();
  gl.enable(gl.DEPTH_TEST);gl.useProgram(pr);
  function frame(t){
    rs();gl.viewport(0,0,cv.width,cv.height);
    gl.clearColor(0.5,0.66,0.86,1);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
    const time=t*0.001;
    const cam=[0,2.6,0];
    const dir=[Math.sin(yaw)*Math.cos(pitch),Math.sin(pitch),-Math.cos(yaw)*Math.cos(pitch)];
    const target=[cam[0]+dir[0],cam[1]+dir[1],cam[2]+dir[2]];
    const vp=mul(persp(1.0,cv.width/cv.height,0.1,200),look(cam,target,[0,1,0]));
    gl.uniformMatrix4fv(U.vp,false,vp);gl.uniform1f(U.time,time);gl.uniform3f(U.cam,cam[0],cam[1],cam[2]);
    gl.bindVertexArray(vao);gl.drawElements(gl.TRIANGLES,idx.length,gl.UNSIGNED_INT,0);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
