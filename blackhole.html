<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Black Hole</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box} html,body{width:100%;height:100%;overflow:hidden;background:#000}
  canvas{display:block;width:100vw;height:100vh;cursor:grab} canvas:active{cursor:grabbing}
  #t{position:fixed;top:12px;left:14px;font:12px ui-monospace,Menlo,monospace;color:#ffd9a0;opacity:.8;user-select:none}
  #t b{color:#ffb347}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="t"><b>◉ BLACK HOLE</b> · gravitational lensing + accretion disk · drag to orbit</div>
<script>
"use strict";
(function(){
  const cv=document.getElementById("c"), gl=cv.getContext("webgl2");
  if(!gl){document.body.innerHTML="<p style='color:#f88;font:16px monospace;padding:40px'>WebGL2 not supported</p>";return;}
  const vs=`#version 300 es
  layout(location=0) in vec2 p; void main(){ gl_Position=vec4(p,0.,1.); }`;
  const fs=`#version 300 es
  precision highp float;
  uniform vec2 u_res; uniform float u_time; uniform vec2 u_cam;  // cam = yaw,pitch
  out vec4 o;
  // hash starfield
  float h(vec3 p){ p=fract(p*0.3183+vec3(.1,.2,.3)); p+=dot(p,p.yzx+19.19); return fract((p.x+p.y)*p.z); }
  vec3 stars(vec3 d){
    vec3 c=vec3(0.);
    for(float i=0.;i<3.;i++){
      vec3 q=d*(60.+i*80.); vec3 id=floor(q); float r=h(id+i*7.);
      if(r>0.94){ vec3 f=fract(q)-.5; float s=smoothstep(.08,0.,length(f))*(r-.94)/.06; c+=s*vec3(.8,.85,1.)*(1.+i); }
    }
    // faint nebula
    float n=h(floor(d*8.))*.5+h(floor(d*16.))*.25;
    c+=vec3(.05,.03,.08)*n;
    return c;
  }
  mat3 rotY(float a){ float s=sin(a),c=cos(a); return mat3(c,0,-s,0,1,0,s,0,c); }
  mat3 rotX(float a){ float s=sin(a),c=cos(a); return mat3(1,0,0,0,c,-s,0,s,c); }
  void main(){
    vec2 uv=(gl_FragCoord.xy*2.-u_res)/u_res.y;
    mat3 rot=rotY(u_cam.x)*rotX(u_cam.y);
    vec3 ro=rot*vec3(0.,0.,9.0);
    vec3 rd=normalize(rot*vec3(uv,-2.2));
    vec3 pos=ro; vec3 dir=rd;
    float Rs=1.0;            // event horizon
    vec3 col=vec3(0.); float alpha=1.;
    bool hit=false;
    float dt=0.16;
    for(int i=0;i<220;i++){
      float r=length(pos);
      if(r<Rs){ hit=true; break; }
      if(r>30.) break;
      // gravity bends the ray (toward center, ~1/r^2)
      vec3 g=-pos/(r*r*r)*1.6;
      dir=normalize(dir+g*dt);
      vec3 npos=pos+dir*dt*r*0.55;
      // accretion disk in y=0 plane
      if(pos.y*npos.y<0.0){
        float tcr=-pos.y/(npos.y-pos.y);
        vec3 dp=mix(pos,npos,tcr); float dr=length(dp.xz);
        if(dr>1.6 && dr<7.0){
          float ang=atan(dp.z,dp.x);
          float spin=u_time*1.2 - 6.0/dr;
          float band=0.5+0.5*sin(ang*2.+spin*3.+sin(dr*3.));
          float turb=0.5+0.5*sin(ang*7.-spin*5.)*sin(dr*5.+spin*2.);
          float heat=smoothstep(7.0,1.6,dr);
          vec3 disk=mix(vec3(1.,.35,.05),vec3(1.,.9,.6),heat);
          disk=mix(disk,vec3(.6,.75,1.),smoothstep(.7,1.,heat)*0.5);
          float bright=(band*.6+turb*.6+.3)*heat*1.7;
          // doppler: approaching side (one half) brighter/bluer
          float dop=0.6+0.6*sin(ang+u_cam.x);
          col+=disk*bright*dop*alpha;
          alpha*=0.55;
        }
      }
      pos=npos;
    }
    if(!hit) col+=stars(dir)*alpha;
    // glow near photon sphere
    col=pow(col,vec3(0.85));
    col*=1.0-0.25*length(uv)*0.4;
    o=vec4(col,1.);
  }`;
  function sh(t,s){const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);if(!gl.getShaderParameter(x,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(x);return x;}
  const pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,vs));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);
  if(!gl.getProgramParameter(pr,gl.LINK_STATUS))throw gl.getProgramInfoLog(pr);
  const vao=gl.createVertexArray();gl.bindVertexArray(vao);const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);gl.enableVertexAttribArray(0);gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
  const U={res:gl.getUniformLocation(pr,"u_res"),time:gl.getUniformLocation(pr,"u_time"),cam:gl.getUniformLocation(pr,"u_cam")};
  let cam=[0.5,-0.35],drag=null;
  cv.addEventListener("pointerdown",e=>drag=[e.clientX,e.clientY]);
  window.addEventListener("pointerup",()=>drag=null);
  cv.addEventListener("pointermove",e=>{ if(!drag)return; cam[0]+=(e.clientX-drag[0])*0.005; cam[1]=Math.max(-1.4,Math.min(1.4,cam[1]+(e.clientY-drag[1])*0.005)); drag=[e.clientX,e.clientY]; });
  function rs(){const d=Math.min(devicePixelRatio||1,2);cv.width=cv.clientWidth*d;cv.height=cv.clientHeight*d;}
  addEventListener("resize",rs);rs();
  gl.useProgram(pr);
  function frame(t){
    rs(); gl.viewport(0,0,cv.width,cv.height);
    if(!drag) cam[0]+=0.0012;
    gl.uniform2f(U.res,cv.width,cv.height); gl.uniform1f(U.time,t*0.001); gl.uniform2f(U.cam,cam[0],cam[1]);
    gl.drawArrays(gl.TRIANGLES,0,3); requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
